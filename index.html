<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サロン通知設定</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

:root {
  /* tiMe and space カラーパレット */
  --bg-color: #a7b6a2;       /* 背景 */
  --text-color: #2e2d2c;     /* 文字色 */
  --border-color: #DCD4C9;   /* 枠線 */
  --btn-color: #8C7A6B;      /* ボタン色 */
  --btn-hover: #756558;
}

* {
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 10vh; /* 上寄せ・背景が見える隙間 */
  min-height: 100vh;
}

.container {
  background-color: #ffffff;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
  width: 90%;
  max-width: 400px;
}

h1 {
  font-family: 'Josefin Sans', 'Noto Sans JP', sans-serif;
  text-align: center;
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 30px;
  color: var(--text-color);
  letter-spacing: 1px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
}

input[type="text"],
input[type="email"] {
  width: 100%;
  padding: 12px 15px;
  font-size: 16px; /* iPhoneズーム対策 */
  font-family: 'Noto Sans JP', sans-serif;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background-color: #FAF9F8;
  color: var(--text-color);
  transition: all 0.3s ease;
  appearance: none;
}

input:focus {
  outline: none;
  border-color: var(--btn-color);
  background-color: #ffffff;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 2px;
  color: #fff;
  background-color: var(--btn-color);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 10px;
  transition: background-color 0.3s ease;
}

button:hover {
  background-color: var(--btn-hover);
}

button:disabled {
  background-color: #ccc;
  cursor: not-allowed;
}

.note {
  font-size: 12px;
  color: #888;
  text-align: center;
  margin-top: 15px;
  line-height: 1.5;
}
  </style>
</head>
<body>

  <div class="container">
    <h1>tiMe and space<br>案内システム登録</h1>
    <p class="note">必要事項を入力し、「登録する」ボタンを押してください。</p>

    <form id="registration-form">
      <div class="form-group">
        <label>お名前（フルネーム）</label>
        <input type="text" id="customer-name" required>
      </div>

      <div class="form-group">
        <label>フリガナ</label>
        <input type="text" id="customer-kana" required>
      </div>

      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="customer-email" required>
      </div>

      <button type="submit" id="submit-btn">登録する</button>
    </form>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
